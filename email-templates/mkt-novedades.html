<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    background: #f0eeff;
  }

  .bg {
    width: 1080px;
    height: 1080px;
    background: linear-gradient(150deg, #f5f2ff 0%, #ede8ff 40%, #e0d9ff 100%);
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
  }

  /* Noise/grain overlay */
  .bg::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  /* Glow circles */
  .glow1 {
    position: absolute;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(124,58,237,0.18) 0%, transparent 70%);
    top: -100px; left: -80px;
    border-radius: 50%;
  }
  .glow2 {
    position: absolute;
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(124,58,237,0.12) 0%, transparent 70%);
    bottom: 80px; right: -60px;
    border-radius: 50%;
  }

  /* HEADER */
  .header {
    position: relative;
    z-index: 2;
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 52px;
    margin-bottom: 6px;
  }

  .logo-text {
    font-size: 17px;
    font-weight: 700;
    color: #1d1d1f;
    letter-spacing: -0.3px;
  }

  /* TITLE */
  .title-block {
    position: relative;
    z-index: 2;
    text-align: center;
    margin-bottom: 36px;
    margin-top: 10px;
  }

  .eyebrow {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #7c3aed;
    margin-bottom: 10px;
  }

  .main-title {
    font-size: 54px;
    font-weight: 800;
    line-height: 1.05;
    letter-spacing: -2px;
    color: #1d1d1f;
  }

  .main-title span {
    background: linear-gradient(135deg, #7c3aed, #a855f7);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    margin-top: 12px;
    font-size: 18px;
    color: #6b7280;
    font-weight: 400;
    line-height: 1.5;
  }

  /* PHONES */
  .phones-row {
    position: relative;
    z-index: 2;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    gap: 0px;
    margin-bottom: 32px;
    height: 380px;
  }

  .phone-wrap {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .phone-wrap.side {
    transform: rotate(-6deg) translateY(24px);
    z-index: 1;
  }
  .phone-wrap.side.right {
    transform: rotate(6deg) translateY(24px);
  }
  .phone-wrap.center {
    z-index: 3;
    transform: translateY(0px) scale(1.08);
  }

  .phone-shell {
    width: 174px;
    height: 346px;
    background: #1a1a1a;
    border-radius: 38px;
    padding: 6px;
    box-shadow:
      0 40px 80px rgba(0,0,0,0.28),
      0 0 0 1px rgba(255,255,255,0.06) inset,
      0 2px 6px rgba(255,255,255,0.08) inset;
    position: relative;
  }

  .phone-shell.center-shell {
    width: 194px;
    height: 384px;
    border-radius: 44px;
  }

  .phone-notch {
    position: absolute;
    top: 6px;
    left: 50%;
    transform: translateX(-50%);
    width: 64px;
    height: 20px;
    background: #1a1a1a;
    border-radius: 0 0 14px 14px;
    z-index: 10;
  }

  .phone-screen {
    width: 100%;
    height: 100%;
    border-radius: 32px;
    overflow: hidden;
    background: #fff;
    position: relative;
  }

  .phone-screen img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top center;
  }

  .phone-screen img.fit-desktop {
    object-fit: cover;
    object-position: top left;
    transform: scale(1.1);
    transform-origin: top left;
  }

  .phone-screen img.fit-chat {
    object-fit: cover;
    object-position: top center;
  }

  .phone-screen img.fit-guest {
    object-fit: cover;
    object-position: top center;
  }

  /* PILLS */
  .pills-row {
    position: relative;
    z-index: 2;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    max-width: 800px;
    margin-bottom: 30px;
  }

  .pill {
    display: flex;
    align-items: center;
    gap: 7px;
    background: rgba(255,255,255,0.75);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(124,58,237,0.15);
    border-radius: 100px;
    padding: 8px 18px;
    font-size: 14px;
    font-weight: 600;
    color: #1d1d1f;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }

  .pill-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* CTA */
  .cta-btn {
    position: relative;
    z-index: 2;
    display: inline-block;
    background: linear-gradient(135deg, #7c3aed, #9333ea);
    color: #fff;
    font-size: 18px;
    font-weight: 700;
    padding: 18px 48px;
    border-radius: 100px;
    letter-spacing: -0.2px;
    box-shadow: 0 8px 32px rgba(124,58,237,0.35);
  }

  .tagline {
    position: relative;
    z-index: 2;
    margin-top: 14px;
    font-size: 13px;
    color: #9ca3af;
    text-align: center;
  }
</style>
</head>
<body>
<div class="bg">
  <div class="glow1"></div>
  <div class="glow2"></div>

  <!-- HEADER -->
  <div class="header">
    <img src="file:///Users/alejandrosatlla/Documents/itineramio/public/isotipo-gradient.svg" width="32" height="18" style="display:block;"/>
    <span class="logo-text">Itineramio</span>
  </div>

  <!-- TITLE -->
  <div class="title-block">
    <p class="eyebrow">Novedades · Marzo 2026</p>
    <h1 class="main-title">Tu apartamento,<br/><span>siempre disponible.</span></h1>
    <p class="subtitle">Manual con IA · Chatbot con vídeo · Lugares · Asistente</p>
  </div>

  <!-- PHONES -->
  <div class="phones-row">
    <!-- Left phone: Añadir lugar -->
    <div class="phone-wrap side">
      <div class="phone-shell">
        <div class="phone-notch"></div>
        <div class="phone-screen" style="background:#f8f7ff;">
          <img src="file:///Users/alejandrosatlla/Desktop/Captura de pantalla 2026-03-26 a las 9.54.54.png" alt="Añadir lugar" style="width:100%;height:100%;object-fit:cover;object-position:top center;"/>
        </div>
      </div>
    </div>

    <!-- Center phone: Chatbot responding with video -->
    <div class="phone-wrap center">
      <div class="phone-shell center-shell">
        <div class="phone-notch"></div>
        <div class="phone-screen" style="background:#fff;">
          <img src="file:///Users/alejandrosatlla/Desktop/Captura de pantalla 2026-03-26 a las 8.51.43.png" alt="Chatbot" style="width:100%;height:100%;object-fit:cover;object-position:top center;"/>
        </div>
      </div>
    </div>

    <!-- Right phone: Guest chatbot greeting -->
    <div class="phone-wrap side right">
      <div class="phone-shell">
        <div class="phone-notch"></div>
        <div class="phone-screen" style="background:#fff;">
          <img src="file:///Users/alejandrosatlla/Desktop/Captura de pantalla 2026-03-26 a las 10.05.17.png" alt="Guest chatbot" style="width:100%;height:100%;object-fit:cover;object-position:top center;"/>
        </div>
      </div>
    </div>
  </div>

  <!-- PILLS -->
  <div class="pills-row">
    <div class="pill"><span class="pill-dot" style="background:#7c3aed;"></span>Manual con IA</div>
    <div class="pill"><span class="pill-dot" style="background:#2563eb;"></span>Chatbot con vídeo</div>
    <div class="pill"><span class="pill-dot" style="background:#059669;"></span>Itineramio Places</div>
    <div class="pill"><span class="pill-dot" style="background:#d97706;"></span>Asistente en panel</div>
  </div>

  <!-- CTA -->
  <div class="cta-btn">Descúbrelo en itineramio.com</div>
  <p class="tagline">Menos mensajes. Más tranquilidad.</p>
</div>
</body>
</html>
